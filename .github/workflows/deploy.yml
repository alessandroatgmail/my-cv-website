# ============================================
# CI/CD Pipeline — Deploy to AWS
# ============================================
# Triggered on every push to the main branch.
# Steps:
#   1. Checkout the repository
#   2. Configure AWS credentials
#   3. Sync static files to S3
#   4. Deploy Lambda functions
#   5. Invalidate CloudFront cache (when available)
# ============================================

name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # Step 1: checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-central-1

      # Step 3: sync static site files to S3
      # knowledge-base/docs/ is excluded — uploaded manually to S3
      # lambda/ is excluded — deployed separately in the next steps
      - name: Sync static files to S3
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "lambda/*" \
            --exclude "knowledge-base/docs/*"

      # Step 4a: package and deploy rag-indexer Lambda
      # zip the function code and upload it to Lambda
      - name: Deploy rag-indexer Lambda
        run: |
          cd lambda/rag-indexer
          zip -r function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name rag-indexer \
            --zip-file fileb://function.zip

      # Step 4b: package and deploy rag-chatbot Lambda
      - name: Deploy rag-chatbot Lambda
        run: |
          cd lambda/rag-chatbot
          zip -r function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name rag-chatbot \
            --zip-file fileb://function.zip

      # Step 4c: deploy view counter Lambda
      - name: Deploy counter Lambda
        run: |
          cd lambda/counter
          zip -r function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name cv-view-counter \
            --zip-file fileb://function.zip

      # Step 5: invalidate CloudFront cache
      # Uncomment when CloudFront is configured
      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
      #       --paths "/*"