# ============================================
# CI/CD Pipeline — Deploy to GCP
# ============================================
# Triggered on every push to the main branch.
# Steps:
#   1. Checkout the repository
#   2. Authenticate to GCP via Service Account
#   3. Sync static files to Cloud Storage
#   4. Invalidate Cloud CDN cache
#   5. Deploy Cloud Run services (counter, rag-indexer, rag-chatbot)
#   6. Run RAG indexer to rebuild the BM25 index
# ============================================

name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # Step 1: checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: authenticate to GCP using the service account JSON key
      # stored as a GitHub secret. This action configures gcloud CLI
      # and sets up application default credentials for all subsequent steps.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: install and configure the gcloud CLI
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Step 4: sync static site files to Cloud Storage.
      # --delete removes files from the bucket that no longer exist locally.
      # lambda/ is excluded — deployed separately as Cloud Run services.
      # knowledge-base/docs/ is excluded — uploaded manually.
      - name: Sync static files to Cloud Storage
        run: |
          gsutil -m rsync -r -d \
            -x "\.git/.*|\.github/.*|.*\.md|lambda/.*|knowledge-base/docs/.*|gha-creds.*\.json" \
            . gs://${{ secrets.GCP_BUCKET }}

      # Step 5: invalidate Cloud CDN cache so visitors immediately see
      # the updated files instead of the cached version.
      - name: Invalidate Cloud CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache cv-load-balancer \
            --path "/*" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      # Step 6a: deploy the visit counter Cloud Run service.
      # gcloud run deploy --source handles both first deploy and updates
      # without the 409 conflict that gcloud functions deploy causes.
      # The Procfile in lambda/counter tells Buildpacks to use
      # functions-framework targeting the visit_counter function.
      - name: Deploy counter Cloud Run service
        run: |
          gcloud run deploy visit-counter \
            --source=lambda/counter \
            --region=europe-west8 \
            --allow-unauthenticated \
            --project=${{ secrets.GCP_PROJECT_ID }}

      # Step 6b: deploy the RAG indexer Cloud Run service.
      # --no-allow-unauthenticated — internal use only, called with identity token.
      - name: Deploy rag-indexer Cloud Run service
        run: |
          gcloud run deploy rag-indexer \
            --source=lambda/rag-indexer \
            --region=europe-west8 \
            --no-allow-unauthenticated \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars="BUCKET_NAME=${{ secrets.GCP_BUCKET }},GCP_PROJECT=${{ secrets.GCP_PROJECT_ID }}" 
          

      # Step 6c: deploy the RAG chatbot Cloud Run service.
      - name: Deploy rag-chatbot Cloud Run service
        run: |
          gcloud run deploy rag-chatbot \
            --source=lambda/rag-chatbot \
            --region=europe-west8 \
            --allow-unauthenticated \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars="\
              BUCKET_NAME=${{ secrets.GCP_BUCKET }},\
              INDEX_KEY=knowledge-base/index.json,\
              TOP_K=3,OWNER_NAME=Alessandro,\
              GCP_REGION=europe-west8,\
              MODEL_ID=gemini-2.5-flash, \
              GCP_PROJECT=${{ secrets.GCP_PROJECT_ID }}"
          

      # Step 7: invoke the RAG indexer after all services are deployed
      # so the BM25 index is always rebuilt when documents change.
      - name: Run RAG indexer
        run: |
          TOKEN=$(gcloud auth print-identity-token)
          URL=$(gcloud run services describe rag-indexer \
            --region=europe-west8 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")
          curl -s -X POST "$URL" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"